<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aisiteru — the night your voice becomes a star</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020810;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
    color: #fff;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 48px;
    gap: 20px;
    z-index: 10;
  }

  #phrase {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 2.5vw, 20px);
    color: rgba(180, 210, 255, 0.7);
    letter-spacing: 0.15em;
    min-height: 28px;
    transition: opacity 1s ease;
    text-shadow: 0 0 20px rgba(100, 160, 255, 0.4);
  }

  #mic-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1.5px solid rgba(150, 200, 255, 0.4);
    background: rgba(10, 30, 70, 0.6);
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  #mic-btn:hover {
    border-color: rgba(150, 200, 255, 0.8);
    background: rgba(20, 50, 110, 0.7);
  }

  #mic-btn.active {
    border-color: rgba(100, 200, 255, 0.9);
    box-shadow: 0 0 30px rgba(80, 160, 255, 0.4), 0 0 60px rgba(80, 160, 255, 0.15);
  }

  #mic-btn.active::before {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(100, 200, 255, 0.3);
    animation: ripple 1.5s ease-out infinite;
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  #mic-icon {
    font-size: 18px;
    transition: transform 0.2s ease;
  }

  #mic-btn.active #mic-icon {
    transform: scale(1.1);
  }

  #label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(150, 180, 220, 0.5);
    text-transform: uppercase;
  }

  #title {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  #title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: 0.4em;
    color: rgba(200, 225, 255, 0.85);
    text-shadow: 0 0 40px rgba(100, 160, 255, 0.3);
  }

  #title p {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(140, 170, 210, 0.45);
    margin-top: 6px;
  }

  #vol-bar {
    width: 120px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  #vol-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(80,160,255,0.6), rgba(180,220,255,0.9));
    border-radius: 2px;
    transition: width 0.05s ease;
  }

  #rec-controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .ctrl-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid rgba(150, 200, 255, 0.3);
    background: rgba(10, 30, 70, 0.5);
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }

  .ctrl-btn:disabled {
    opacity: 0.25;
    pointer-events: none;
  }

  .ctrl-btn:hover:not(:disabled) {
    border-color: rgba(150, 200, 255, 0.8);
    background: rgba(20, 50, 110, 0.7);
  }

  .ctrl-btn.recording {
    border-color: rgba(255, 100, 100, 0.9);
    box-shadow: 0 0 20px rgba(255, 80, 80, 0.4);
  }

  #play-btn.playing {
    border-color: rgba(100, 255, 180, 0.9);
    box-shadow: 0 0 20px rgba(80, 255, 160, 0.3);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="title">
  <h1>aisiteru</h1>
  <p>if I became a star — could I find you again?</p>
</div>

<div id="ui">
  <div id="phrase">let your voice reach the sky</div>
  <div id="vol-bar"><div id="vol-fill"></div></div>
  <div id="rec-controls">
    <button class="ctrl-btn" id="rec-btn" onclick="toggleRecord()" ontouchstart="handleTouchRec(event)" title="Record">⏺</button>
    <button id="mic-btn" onclick="toggleMic()" ontouchstart="handleTouch(event)">
      <span id="mic-icon">🎤</span>
    </button>
    <button class="ctrl-btn" id="play-btn" onclick="playRecording()" ontouchstart="handleTouchPlay(event)" disabled title="Play">▶</button>
  </div>
  <div id="label" id="label-text">tap to begin</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ---- Poetic phrases ----
const phrases = [
  "let your voice reach the sky",
  "I love you so much it makes me want to cry",
  "let me hear your voice",
  "so we never drift apart",
  "the most beautiful voice in the world",
  "the night is gentle",
  "I'll always be here",
];
let phraseIdx = 0;
const phraseEl = document.getElementById('phrase');

function nextPhrase() {
  phraseEl.style.opacity = 0;
  setTimeout(() => {
    phraseIdx = (phraseIdx + 1) % phrases.length;
    phraseEl.textContent = phrases[phraseIdx];
    phraseEl.style.opacity = 1;
  }, 1000);
}
setInterval(nextPhrase, 40000);

// ---- Stars ----
let stars = [];
let particles = [];

class Star {
  constructor(x, y, r, fixed) {
    this.x = x;
    this.y = y;
    this.r = r;
    this.fixed = fixed;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.twinkle = Math.random() * Math.PI * 2;
    this.speed = Math.random() * 0.6 + 0.3;
    this.hue = Math.random() * 40 + 200; // blue ~ cyan
    this.trail = [];
  }

  update() {
    // slow twinkling (randomized cycle)
    this.twinkle += this.twinkleSpeed || (this.twinkleSpeed = Math.random() * 0.008 + 0.004);
    this.opacity = 0.25 + Math.sin(this.twinkle) * 0.35 + 0.1;
    if (!this.fixed) {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 12) this.trail.shift();
      this.y -= this.speed;
      this.x += Math.sin(this.twinkle * 0.5) * 0.4;
      if (this.y < canvas.height * 0.15) {
        this.fixed = true;
        this.trail = [];
        // particle burst
        for (let i = 0; i < 8; i++) {
          particles.push(new Particle(this.x, this.y, this.hue));
        }
      }
    }
  }

  draw() {
    const twinkleOp = this.opacity + Math.sin(this.twinkle) * 0.2;

    // trail
    if (!this.fixed && this.trail.length > 1) {
      for (let i = 0; i < this.trail.length; i++) {
        const t = i / this.trail.length;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, this.r * t * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${t * 0.4})`;
        ctx.fill();
      }
    }

    // glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 8);
    grd.addColorStop(0, `hsla(${this.hue}, 80%, 90%, ${twinkleOp * 0.5})`);
    grd.addColorStop(1, `hsla(${this.hue}, 80%, 90%, 0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 8, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 60%, 95%, ${twinkleOp})`;
    ctx.fill();
  }
}

// ---- Shooting stars ----
let shootingStars = [];

class ShootingStar {
  constructor() {
    // appear from a random side
    const side = Math.floor(Math.random() * 4); // 0=top, 1=right, 2=bottom, 3=left
    const w = canvas.width, h = canvas.height;
    if (side === 0) {
      this.x = Math.random() * w; this.y = -10;
      this.vx = (Math.random() - 0.5) * 6; this.vy = Math.random() * 5 + 4;
    } else if (side === 1) {
      this.x = w + 10; this.y = Math.random() * h * 0.6;
      this.vx = -(Math.random() * 5 + 4); this.vy = Math.random() * 4 + 1;
    } else if (side === 2) {
      this.x = Math.random() * w; this.y = h + 10;
      this.vx = (Math.random() - 0.5) * 6; this.vy = -(Math.random() * 5 + 4);
    } else {
      this.x = -10; this.y = Math.random() * h * 0.6;
      this.vx = Math.random() * 5 + 4; this.vy = Math.random() * 4 + 1;
    }
    this.trail = [];
    this.life = 1.0;
    this.speed = Math.random() * 2 + 3;
    this.len = Math.floor(Math.random() * 20 + 25);
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.len) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.012;
  }

  draw() {
    if (this.trail.length < 2) return;
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = `rgba(200, 230, 255, ${t * this.life * 0.8})`;
      ctx.lineWidth = t * 1.8;
      ctx.stroke();
    }
    // tip sparkle
    ctx.beginPath();
    ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
    ctx.fill();
  }

  isDead() {
    return this.life <= 0 ||
      this.x < -50 || this.x > canvas.width + 50 ||
      this.y < -50 || this.y > canvas.height + 50;
  }
}

// shooting star every 20 seconds
setInterval(() => {
  shootingStars.push(new ShootingStar());
}, 20000);

class Particle {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    this.hue = hue;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 2 + 0.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1.0;
    this.r = Math.random() * 2 + 0.5;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.04;
    this.life -= 0.025;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 90%, ${this.life})`;
    ctx.fill();
  }
}

// initial background stars (reduced to 35)
for (let i = 0; i < 35; i++) {
  stars.push(new Star(
    Math.random() * canvas.width,
    Math.random() * canvas.height,
    Math.random() * 1.2 + 0.3,
    true
  ));
}

// ---- Orion star positions (rotated horizontal, 0.7x scale) ----
// rx=horizontal, ry=vertical swapped for sideways orientation
// original vertical: shoulders top, feet bottom → horizontal: shoulders left, feet right
const orionStars = [
  // Betelgeuse (left shoulder → top)
  { rx: -0.18, ry: -0.10, r: 3.2 * 0.7, name: 'Betelgeuse', hue: 20 },
  // Bellatrix (right shoulder → bottom)
  { rx: -0.20, ry:  0.10, r: 2.2 * 0.7, name: 'Bellatrix',  hue: 200 },
  // Mintaka (belt)
  { rx:  0.00, ry: -0.07, r: 1.8 * 0.7, name: 'Mintaka',    hue: 210 },
  // Alnilam (belt center)
  { rx:  0.02, ry:  0.00, r: 2.0 * 0.7, name: 'Alnilam',    hue: 210 },
  // Alnitak (belt)
  { rx:  0.00, ry:  0.07, r: 1.8 * 0.7, name: 'Alnitak',    hue: 210 },
  // Saiph (left foot → upper right)
  { rx:  0.22, ry: -0.09, r: 1.6 * 0.7, name: 'Saiph',      hue: 210 },
  // Rigel (right foot → lower right)
  { rx:  0.20, ry:  0.12, r: 3.0 * 0.7, name: 'Rigel',      hue: 200 },
];

// ---- Microphone ----
let analyser, dataArray, micActive = false;
const btn = document.getElementById('mic-btn');
const volFill = document.getElementById('vol-fill');
const labelEl = document.getElementById('label');

// touch support for mobile (prevent double-fire)
let lastTouch = 0;
function handleTouch(e) {
  e.preventDefault();
  const now = Date.now();
  if (now - lastTouch < 500) return;
  lastTouch = now;
  toggleMic();
}

let lastTouchRec = 0;
function handleTouchRec(e) {
  e.preventDefault();
  const now = Date.now();
  if (now - lastTouchRec < 500) return;
  lastTouchRec = now;
  toggleRecord();
}

let lastTouchPlay = 0;
function handleTouchPlay(e) {
  e.preventDefault();
  const now = Date.now();
  if (now - lastTouchPlay < 500) return;
  lastTouchPlay = now;
  playRecording();
}

// ---- Recording feature ----
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
let recordedAudio = null;
let isRecording = false;
let recStream = null;

const recBtn = document.getElementById('rec-btn');
const playBtn = document.getElementById('play-btn');

async function toggleRecord() {
  if (!isRecording) {
    // start recording
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(recStream);
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
        recordedAudio = new Audio(URL.createObjectURL(recordedBlob));
        recordedAudio.playsInline = true; // iOS support
        recordedAudio.onended = () => {
          playBtn.classList.remove('playing');
          playBtn.textContent = '▶';
        };
        playBtn.disabled = false;
        labelEl.textContent = 'recorded ▶ to play';
      };
      mediaRecorder.start();
      isRecording = true;
      recBtn.classList.add('recording');
      recBtn.textContent = '⏹';
      labelEl.textContent = 'recording… tap again to stop';

      // also activate mic to spawn stars
      if (!micActive) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const source = audioCtx.createMediaStreamSource(recStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        micActive = true;
        btn.classList.add('active');
      }
    } catch(e) {
      labelEl.textContent = 'microphone permission required';
    }
  } else {
    // stop recording
    mediaRecorder.stop();
    recStream.getTracks().forEach(t => t.stop());
    isRecording = false;
    recBtn.classList.remove('recording');
    recBtn.textContent = '⏺';
    micActive = false;
    btn.classList.remove('active');
    volFill.style.width = '0%';
  }
}

function playRecording() {
  if (!recordedAudio) return;
  if (playBtn.classList.contains('playing')) {
    recordedAudio.pause();
    recordedAudio.currentTime = 0;
    playBtn.classList.remove('playing');
    playBtn.textContent = '▶';
  } else {
    recordedAudio.play();
    playBtn.classList.add('playing');
    playBtn.textContent = '⏸';
  }
}

async function toggleMic() {
  if (!micActive) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // iOS requires resume after user interaction
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      micActive = true;
      btn.classList.add('active');
      labelEl.textContent = 'speak and stars are born';
    } catch(e) {
      labelEl.textContent = 'microphone permission required';
    }
  } else {
    micActive = false;
    btn.classList.remove('active');
    labelEl.textContent = 'tap to begin';
    volFill.style.width = '0%';
  }
}

function getVolume() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
  return sum / dataArray.length / 255;
}

// ---- Aurora state ----
let auroraLevel = 0; // 0=night sky, 1=full aurora

function drawAurora(alpha) {
  if (alpha <= 0) return;
  const w = canvas.width, h = canvas.height;
  const t = frame * 0.0027;

  for (let i = 0; i < 5; i++) {
    const xOffset = Math.sin(t + i * 1.3) * w * 0.15;
    const yBase = h * (0.15 + i * 0.08);
    const bandH = h * (0.18 + Math.sin(t * 0.7 + i) * 0.06);
    const hue = (130 + i * 25 + Math.sin(t + i) * 20) % 360; // green ~ blue ~ purple

    const grd = ctx.createLinearGradient(0, yBase - bandH, 0, yBase + bandH);
    grd.addColorStop(0, `hsla(${hue}, 90%, 55%, 0)`);
    grd.addColorStop(0.4, `hsla(${hue}, 90%, 55%, ${0.18 * alpha})`);
    grd.addColorStop(0.6, `hsla(${(hue+30)%360}, 85%, 65%, ${0.22 * alpha})`);
    grd.addColorStop(1, `hsla(${hue}, 90%, 55%, 0)`);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, yBase);
    for (let x = 0; x <= w; x += 20) {
      const wave = Math.sin(x * 0.005 + t + i * 0.8) * 40 + xOffset;
      ctx.lineTo(x, yBase + wave);
    }
    ctx.lineTo(w, yBase - bandH * 2);
    ctx.lineTo(0, yBase - bandH * 2);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.restore();
  }
}

function drawOrion(auroraAlpha) {
  const cx = canvas.width * 0.5;
  const cy = canvas.height * 0.42;
  const scale = Math.min(canvas.width, canvas.height);
  const starOpacity = Math.max(0.3, 1.0 - auroraAlpha * 0.5);

  // one full rotation every 40 seconds (40s = 40×60 frames = 2400 frames)
  const angle = (frame / 2400) * Math.PI * 2;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // belt lines
  const belt = [2, 3, 4];
  ctx.strokeStyle = `rgba(180, 210, 255, ${0.15 * starOpacity})`;
  ctx.lineWidth = 0.8;
  for (let i = 0; i < belt.length - 1; i++) {
    const a = orionStars[belt[i]], b = orionStars[belt[i+1]];
    ctx.beginPath();
    ctx.moveTo(a.rx * scale, a.ry * scale);
    ctx.lineTo(b.rx * scale, b.ry * scale);
    ctx.stroke();
  }
  // shoulder-to-hip lines
  const lines = [[0,2],[1,4],[0,5],[1,6]];
  for (const [ai, bi] of lines) {
    const a = orionStars[ai], b = orionStars[bi];
    ctx.beginPath();
    ctx.moveTo(a.rx * scale, a.ry * scale);
    ctx.lineTo(b.rx * scale, b.ry * scale);
    ctx.stroke();
  }

  // stars
  for (const s of orionStars) {
    const x = s.rx * scale;
    const y = s.ry * scale;
    const pulse = Math.sin(frame * 0.04 + s.rx * 10) * 0.15;
    const op = (0.7 + pulse) * starOpacity;

    // glow
    const grd = ctx.createRadialGradient(x, y, 0, x, y, s.r * 12);
    grd.addColorStop(0, `hsla(${s.hue}, 70%, 90%, ${op * 0.6})`);
    grd.addColorStop(1, `hsla(${s.hue}, 70%, 90%, 0)`);
    ctx.beginPath();
    ctx.arc(x, y, s.r * 12, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(x, y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, 50%, 98%, ${op})`;
    ctx.fill();
  }

  ctx.restore();
}

// ---- Draw loop ----
let frame = 0;
function loop() {
  requestAnimationFrame(loop);
  frame++;

  const vol = micActive ? getVolume() : 0;

  // aurora level rises with volume, gradually fades
  if (micActive && vol > 0.04) {
    auroraLevel = Math.min(1, auroraLevel + vol * 0.08);
  } else {
    auroraLevel = Math.max(0, auroraLevel - 0.003);
  }

  // background color (night → slightly brighter with aurora)
  const bgAlpha = 0.25 + auroraLevel * 0.1;
  ctx.fillStyle = `rgba(2, 8, 16, ${bgAlpha})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw aurora
  drawAurora(auroraLevel);

  // draw Orion
  drawOrion(auroraLevel);

  volFill.style.width = Math.min(vol * 300, 100) + '%';

  // generat
